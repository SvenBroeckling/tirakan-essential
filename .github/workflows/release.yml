name: Build and Release PDFs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        shell: bash
        run: |
          version="$(grep -oP '\\newcommand\{\\tirakanversion\}\{\K[^}]+' version.tex | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "Could not read version from version.tex" >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$version' from version.tex is not in x.y.z format" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version.tex changed
        id: version_file
        shell: bash
        run: |
          before="${{ github.event.before }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$before" "${{ github.sha }}" | grep -qx 'version.tex'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sheet.tex pass 1
        uses: xu-cheng/latex-action@v3
        with:
          root_file: sheet.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Build sheet.tex pass 2
        uses: xu-cheng/latex-action@v3
        with:
          root_file: sheet.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Build main.tex pass 1
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Build main.tex pass 2
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tirakan-essential-pdfs-v${{ steps.version.outputs.value }}
          path: |
            main.pdf
            sheet.pdf
          if-no-files-found: error

      - name: Create GitHub release
        if: steps.version_file.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            main.pdf
            sheet.pdf
