name: Build and Release PDFs

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml
      - version.tex
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: version
        shell: bash
        run: |
          version="$(grep -oP '\\newcommand\{\\tirakanversion\}\{\K[^}]+' version.tex | head -n 1)"
          if [[ -z "$version" ]]; then
            echo "Could not read version from version.tex" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version increased
        id: gate
        shell: bash
        run: |
          git fetch --tags --force
          current="${{ steps.version.outputs.value }}"
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          latest="${latest_tag#v}"

          if [[ -z "$latest_tag" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          highest="$(printf '%s\n%s\n' "$latest" "$current" | sort -V | tail -n 1)"
          if [[ "$highest" == "$current" && "$current" != "$latest" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Stop when version did not increase
        if: steps.gate.outputs.should_release != 'true'
        shell: bash
        run: echo "Version ${{ steps.version.outputs.value }} does not exceed latest release ${{ steps.gate.outputs.latest_tag }}."

      - name: Build sheet.tex pass 1
        if: steps.gate.outputs.should_release == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: sheet.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Build sheet.tex pass 2
        if: steps.gate.outputs.should_release == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: sheet.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Build main.tex pass 1
        if: steps.gate.outputs.should_release == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Build main.tex pass 2
        if: steps.gate.outputs.should_release == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          latexmk_use_lualatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Upload build artifacts
        if: steps.gate.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tirakan-essential-pdfs-v${{ steps.version.outputs.value }}
          path: |
            main.pdf
            sheet.pdf
          if-no-files-found: error

      - name: Create GitHub release
        if: steps.gate.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            main.pdf
            sheet.pdf
